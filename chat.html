<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Legend AI Chat</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b1020;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

header{
background:#111827;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

#chatBox{
flex:1;
padding:15px;
overflow-y:auto;
}

.message{
background:#1f2937;
padding:12px;
margin:10px 0;
border-radius:10px;
}

.user{
background:#2563eb;
text-align:right;
}

.ai{
background:#1f2937;
}

.bottom{
display:flex;
padding:10px;
background:#111827;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
outline:none;
}

button{
margin-left:10px;
padding:12px 20px;
background:#00c853;
color:white;
border:none;
border-radius:10px;
}
</style>

</head>
<body>

<header>
🤖 Global Legend AI
</header>

<div id="chatBox">
<div class="message ai">
👋 Welcome! Ask me anything.
</div>
</div>

<div class="bottom">
<input type="text" id="userInput" placeholder="Type your message...">
<button id="sendBtn">Send</button>
</div>
<script type="module" src="gemini.js"></script>
<script src="script.js"></script>

</body>
</html>
